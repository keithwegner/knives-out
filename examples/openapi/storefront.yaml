openapi: 3.0.3
info:
  title: Storefront API
  version: 1.0.0
paths:
  /catalog/items:
    get:
      operationId: listCatalogItems
      tags: [catalog, read]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
        - name: X-Trace
          in: header
          required: false
          schema:
            type: string
            minLength: 6
            maxLength: 12
      responses:
        '200':
          description: Catalog items
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [sku, name]
                  properties:
                    sku:
                      type: string
                      format: uuid
                    name:
                      type: string
  /draft-orders:
    post:
      operationId: createDraftOrder
      tags: [orders, write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customerEmail, note, lineItems]
              properties:
                customerEmail:
                  type: string
                  format: email
                note:
                  type: string
                  minLength: 5
                  maxLength: 40
                lineItems:
                  type: array
                  minItems: 1
                  maxItems: 3
                  items:
                    type: object
                    required: [sku, quantity]
                    properties:
                      sku:
                        type: string
                        format: uuid
                      quantity:
                        type: integer
                        minimum: 1
                        maximum: 5
      responses:
        '201':
          description: Draft order created
          content:
            application/json:
              schema:
                type: object
                required: [draftId, customerEmail]
                properties:
                  draftId:
                    type: string
                    format: uuid
                  customerEmail:
                    type: string
                    format: email
  /draft-orders/{draftId}:
    get:
      operationId: getDraftOrder
      tags: [orders, read]
      parameters:
        - name: draftId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Draft order details
          content:
            application/json:
              schema:
                type: object
                required: [draftId, customerEmail]
                properties:
                  draftId:
                    type: string
                    format: uuid
                  customerEmail:
                    type: string
                    format: email
