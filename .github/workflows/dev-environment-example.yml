name: dev-environment-example

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  SPEC_PATH: examples/openapi/storefront.yaml

jobs:
  knives-out-dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Generate attack suite
        run: |
          knives-out generate "$SPEC_PATH" --tag orders --out attacks.json
          # Path filters are exact matches against the OpenAPI path template:
          # knives-out generate "$SPEC_PATH" \
          #   --path /draft-orders/{draftId} \
          #   --out attacks.json
          # For stateful coverage, opt in to built-in workflows:
          # knives-out generate "$SPEC_PATH" \
          #   --tag orders \
          #   --auto-workflows \
          #   --out attacks.json
          # For app-specific journeys, add a workflow pack module:
          # knives-out generate "$SPEC_PATH" \
          #   --auto-workflows \
          #   --workflow-pack-module examples/workflow_packs/listed_pet_lookup.py \
          #   --out attacks.json
      - name: Run suite against dev environment
        shell: bash
        env:
          KNIVES_OUT_BASE_URL: ${{ secrets.KNIVES_OUT_BASE_URL }}
          KNIVES_OUT_AUTH_HEADER: ${{ secrets.KNIVES_OUT_AUTH_HEADER }}
          KNIVES_OUT_AUTH_QUERY: ${{ secrets.KNIVES_OUT_AUTH_QUERY }}
          KNIVES_OUT_LOGIN_USERNAME: ${{ secrets.KNIVES_OUT_LOGIN_USERNAME }}
          KNIVES_OUT_LOGIN_PASSWORD: ${{ secrets.KNIVES_OUT_LOGIN_PASSWORD }}
        run: |
          if [[ -z "${KNIVES_OUT_BASE_URL}" ]]; then
            echo "Set the KNIVES_OUT_BASE_URL repository secret before running this workflow." >&2
            exit 1
          fi

          args=(
            --base-url "${KNIVES_OUT_BASE_URL}"
            --artifact-dir artifacts
            --out results.json
            --tag orders
          )

          if [[ -n "${KNIVES_OUT_AUTH_HEADER}" ]]; then
            args+=(--header "${KNIVES_OUT_AUTH_HEADER}")
          fi

          if [[ -n "${KNIVES_OUT_AUTH_QUERY}" ]]; then
            args+=(--query "${KNIVES_OUT_AUTH_QUERY}")
          fi

          # For login/session auth, load a plugin module instead of static header/query credentials:
          # args+=(--auth-plugin-module examples/auth_plugins/login_bearer.py)
          # For identity-aware authorization coverage, use a checked-in profile file instead:
          # args+=(
          #   --profile-file examples/auth_profiles/anonymous-user-admin.yml
          #   --profile anonymous
          #   --profile admin
          # )

          knives-out run attacks.json "${args[@]}"
      - name: Render Markdown report
        run: |
          knives-out report results.json --out report.md
          # If you keep a checked-in .knives-out-ignore.yml file in the repo root,
          # report, verify, and promote will load it automatically.
          # To use a different file explicitly, add:
          #   --suppressions path/to/suppressions.yml
      - name: Render baseline-aware report
        if: ${{ hashFiles('previous-results.json') != '' }}
        run: |
          knives-out report results.json \
            --baseline previous-results.json \
            --out regression-report.md
      - name: Verify findings against CI policy
        run: |
          knives-out verify results.json \
            --min-severity high \
            --min-confidence medium
          # To fail only on new qualifying regressions:
          # knives-out verify results.json \
          #   --baseline previous-results.json \
          #   --min-severity high \
          #   --min-confidence medium
          # To seed a new suppression file for review outside CI, run:
          # knives-out triage results.json --out .knives-out-ignore.yml
      - name: Promote qualifying findings into a regression suite
        if: always()
        run: |
          knives-out promote results.json \
            --attacks attacks.json \
            --out regression-attacks.json
          # For baseline-aware promotion, add:
          #   --baseline previous-results.json
      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: knives-out-dev-results
          if-no-files-found: ignore
          path: |
            attacks.json
            regression-attacks.json
            results.json
            report.md
            regression-report.md
            artifacts/
